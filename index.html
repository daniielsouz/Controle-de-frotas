<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <script src="index.js" defer></script>
    <title>Controle de frotas</title>
  </head>
  <header class="cabecalho">
    <h1 class="cabecalho_titulo">Controle de Frotas</h1>
    <h3 class="cabecalho_texto">Você no controle</h3>
  </header>
  <body>
    <main class="container">
      <section></section>
      <section class="container_sessao">
        <table class="tabela" id="tabela_viagem">
          <tr class="tabela_linha">
            <th class="tabela_coluna tabela_titulo">Data</th>
            <th class="tabela_coluna tabela_titulo">Placa</th>
            <th class="tabela_coluna tabela_titulo">Motorista</th>
            <th class="tabela_coluna tabela_titulo">Destido saida</th>
            <th class="tabela_coluna tabela_titulo">Destino chegada</th>
          </tr>
        </table>
      </section>
      <section class="container_sessao_inputs">
        <div class="inputs_dados">
          <div class="div_inputs">
            <input class="inputs" type="date" id="input_data" />
            <select class="inputs" name="placas_cadastradas" id="input_placas">
              <option selected disabled value="Placa veículo">
                Placa veículo
              </option>
            </select>
            <input
              class="inputs"
              type="text"
              id="input_motorista"
              placeholder="Motorista"
            />

            <div>
              <input
                class="inputs"
                type="text"
                id="input_saida"
                placeholder="Destino de saída"
                required
              />
              <input
                class="inputs"
                type="text"
                id="input_chegada"
                placeholder="Destino de chegada"
              />
              <p class="aviso" id="erro_inputs"></p>
            </div>
          </div>
          <div class="input_cadastro_placa oculto">
            <input
              class="inputs"
              type="text"
              maxlength="7"
              placeholder="Digite o número da placa"
              id="entrada_cadastro_placa"
            />
            <p class="aviso" id="erro_placa"></p>
            <button class="botao" id="salvar_cadastro_placa">Salvar</button>
            <button class="botao" id="cancelar_cadastro_placa">Cancelar</button>
          </div>
        </div>
        <div class="inputs_remover_placa"></div>
        <div class="bts_placa">
          <button class="botao" id="cadastrarPlaca">Cadastrar Placa</button>
          <button class="botao" id="removerPlaca">Remover Placa</button>
        </div>
        <button class="botao" id="adicionar_viagem">Adicionar Viagem</button>
        <button class="botao oculto" id="cancelar_remocao">Cancelar</button>
      </section>
    </main>
    <section class="container_historico">
      <h2 class="titulo_historico">Histórico de Viagens</h2>
      <table class="tabela tabela_historico_dado" id="tabela_historico"></table>
    </section>
    <footer class="rodape">
      <h3 class="rodape_titulo">Criado e desenvolvido por Daniel de Souza</h3>
    </footer>
  </body>
</html>
